<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Site</title>
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="content">
    <div id="profile-pic"></div>
    <h1>Me siga nas redes:</h1>
    <button class="buttonSocial" onclick="window.open('https://instagram.com/devmorewme')">
      <img src="img/instagram.png" alt="Instagram">
      <p>Instagram</p>
    </button>
      <button class="buttonSocial" onclick="window.open('https://morewme.wordpress.com/')">
      <img src="img/wordpress.png" alt="Blog">
      <p>Blog</p>
    </button>
      <button class="buttonSocial" onclick="window.open('https://twitter.com/morewme')">
      <img src="img/twitter.png" alt="Twitter">
      <p>Twitter</p>
    </button>
      <button class="buttonSocial" onclick="window.open('https://linkedin.com/in/morewme')">
      <img src="img/linkedin.png" alt="LinkedIn">
      <p>LinkedIn</p>
    </button>
  </div>
</body>
</html>
